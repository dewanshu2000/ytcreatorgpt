<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YTCreatorGPT — Free AI for Content Creators</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d0d0d;--card:#1e1e1e;--border:#2a2a2a;--accent:#ff4d00;--accent2:#ffad00;--text:#f0ede8;--muted:#888}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;background-image:radial-gradient(ellipse 80% 50% at 50% -20%,rgba(255,77,0,.12),transparent)}
header{width:100%;max-width:780px;padding:32px 24px 0;display:flex;flex-direction:column;align-items:center;gap:8px;animation:fadeDown .6s ease both}
.logo-row{display:flex;align-items:center;gap:12px}
.logo-icon{width:44px;height:44px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 0 24px rgba(255,77,0,.35)}
h1{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;background:linear-gradient(90deg,#fff 40%,var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.tagline{font-size:13px;color:var(--muted);text-align:center}
.badges{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:4px}
.badge{background:rgba(255,77,0,.1);border:1px solid rgba(255,77,0,.25);color:var(--accent2);font-size:11px;padding:3px 10px;border-radius:999px}
.chat-wrapper{width:100%;max-width:780px;padding:20px 16px;flex:1;display:flex;flex-direction:column;gap:16px;animation:fadeUp .6s .2s ease both}
#chat-box{display:flex;flex-direction:column;gap:14px;min-height:360px;max-height:58vh;overflow-y:auto;padding:4px;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.msg{display:flex;gap:10px;max-width:88%;animation:msgPop .25s ease both}
.msg.user{align-self:flex-end;flex-direction:row-reverse}
.msg.bot{align-self:flex-start}
.avatar{width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;margin-top:2px}
.msg.bot .avatar{background:linear-gradient(135deg,var(--accent),var(--accent2))}
.msg.user .avatar{background:#2a2a2a}
.bubble{padding:12px 16px;border-radius:16px;font-size:14.5px;line-height:1.65;max-width:100%;word-break:break-word}
.msg.bot .bubble{background:var(--card);border:1px solid var(--border);border-top-left-radius:4px}
.msg.user .bubble{background:var(--accent);border-top-right-radius:4px;color:#fff}
.bubble strong{color:var(--accent2)}
.bubble ul,.bubble ol{padding-left:18px;margin:6px 0}
.bubble li{margin:3px 0}
.typing .bubble{display:flex;align-items:center;gap:5px;padding:14px 18px}
.dot{width:7px;height:7px;border-radius:50%;background:var(--muted);animation:bounce 1.2s infinite ease-in-out}
.dot:nth-child(2){animation-delay:.2s}
.dot:nth-child(3){animation-delay:.4s}
.suggestions{display:flex;gap:8px;flex-wrap:wrap}
.suggestion-btn{background:var(--card);border:1px solid var(--border);color:var(--text);font-family:'DM Sans',sans-serif;font-size:12.5px;padding:7px 13px;border-radius:999px;cursor:pointer;transition:all .18s ease}
.suggestion-btn:hover{border-color:var(--accent);color:var(--accent2);background:rgba(255,77,0,.08)}
.input-area{display:flex;gap:10px;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:10px 10px 10px 16px;transition:border-color .2s}
.input-area:focus-within{border-color:var(--accent)}
#user-input{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14.5px;resize:none;max-height:120px;line-height:1.5;padding:4px 0}
#user-input::placeholder{color:var(--muted)}
#send-btn{background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:10px;width:40px;height:40px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:opacity .2s,transform .15s;align-self:flex-end}
#send-btn:hover{opacity:.88;transform:scale(1.05)}
#send-btn:disabled{opacity:.35;cursor:not-allowed}
#send-btn svg{width:18px;height:18px;fill:#fff}
.input-hint{font-size:11.5px;color:var(--muted);text-align:center;padding-bottom:16px}
.credit{font-size:11px;color:#444;text-align:center;padding-bottom:10px}
@keyframes fadeDown{from{opacity:0;transform:translateY(-16px)}to{opacity:1;transform:none}}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
@keyframes msgPop{from{opacity:0;transform:scale(.95) translateY(6px)}to{opacity:1;transform:none}}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-7px)}}
@media(max-width:500px){h1{font-size:20px}.msg{max-width:96%}}
</style>
</head>
<body>
<header>
  <div class="logo-row">
    <div class="logo-icon">🎬</div>
    <h1>YTCreatorGPT</h1>
  </div>
  <p class="tagline">Your free AI assistant for YouTube growth, scripts, video ideas, captions & more</p>
  <div class="badges">
    <span class="badge">✅ 100% Free</span>
    <span class="badge">🚫 No Sign Up</span>
    <span class="badge">🤖 AI Powered</span>
    <span class="badge">🎬 Made for Creators</span>
  </div>
</header>
<div class="chat-wrapper">
  <div id="chat-box"></div>
  <div class="suggestions" id="suggestions">
    <button class="suggestion-btn" onclick="sendSuggestion(this)">💡 Give me 5 video ideas</button>
    <button class="suggestion-btn" onclick="sendSuggestion(this)">✍️ Write a hook for my video</button>
    <button class="suggestion-btn" onclick="sendSuggestion(this)">📲 Write an Instagram caption</button>
    <button class="suggestion-btn" onclick="sendSuggestion(this)">💌 Write a brand pitch email</button>
    <button class="suggestion-btn" onclick="sendSuggestion(this)">🔑 Give me SEO keywords</button>
  </div>
  <div class="input-area">
    <textarea id="user-input" rows="1" placeholder="Ask me anything about content creation..." oninput="autoResize(this)" onkeydown="handleKey(event)"></textarea>
    <button id="send-btn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
  <p class="input-hint">Press Enter to send · Shift+Enter for new line</p>
  <p class="credit">Made with ❤️ by Dewanshu · Free for all creators</p>
</div>
<script>
const API_KEY = 'AIzaSyCVwDPkpczm1jS4KuQ3C31VBN2fHvipnh8';

const SYSTEM_PROMPT = `You are YTCreatorGPT, a friendly expert AI assistant for YouTube content creators. Help with video ideas, scripts, hooks, captions, hashtags, brand pitch emails, and SEO keywords. Be friendly, practical and actionable. Use bullet points. When someone first messages you say: "Hey! 👋 I'm YTCreatorGPT — your free AI assistant for content creation. I can help you with video ideas, scripts, hooks, captions, hashtags, brand pitches and more. What are you working on today? 🎬". Always end with a helpful follow-up question.`;

let history=[];
window.onload=()=>{addBotMessage("Hey! 👋 I'm YTCreatorGPT — your free AI assistant for content creation. I can help you with video ideas, scripts, hooks, captions, hashtags, brand pitches and more. What are you working on today? 🎬")};
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px'}
function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage()}}
function sendSuggestion(btn){document.getElementById('user-input').value=btn.textContent.replace(/^[^\s]+\s/,'').trim();document.getElementById('suggestions').style.display='none';sendMessage()}
async function sendMessage(){
  const input=document.getElementById('user-input');
  const text=input.value.trim();
  if(!text)return;
  input.value='';input.style.height='auto';
  document.getElementById('suggestions').style.display='none';
  addUserMessage(text);
  history.push({role:'user',parts:[{text}]});
  const btn=document.getElementById('send-btn');
  btn.disabled=true;
  const tid=addTyping();
  try{
    const res=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({system_instruction:{parts:[{text:SYSTEM_PROMPT}]},contents:history,generationConfig:{temperature:0.8,maxOutputTokens:1024}})});
    const data=await res.json();
    removeTyping(tid);
    if(data.error){addBotMessage('⚠️ Error: '+data.error.message)}
    else{const reply=data.candidates?.[0]?.content?.parts?.[0]?.text||'Sorry, try again.';history.push({role:'model',parts:[{text:reply}]});addBotMessage(reply)}
  }catch(e){removeTyping(tid);addBotMessage('⚠️ Connection error. Please try again.')}
  btn.disabled=false;input.focus()
}
function addUserMessage(text){const box=document.getElementById('chat-box');const div=document.createElement('div');div.className='msg user';div.innerHTML=`<div class="avatar">👤</div><div class="bubble">${esc(text)}</div>`;box.appendChild(div);scroll()}
function addBotMessage(text){const box=document.getElementById('chat-box');const div=document.createElement('div');div.className='msg bot';div.innerHTML=`<div class="avatar">🎬</div><div class="bubble">${fmt(text)}</div>`;box.appendChild(div);scroll()}
function addTyping(){const box=document.getElementById('chat-box');const id='t'+Date.now();const div=document.createElement('div');div.className='msg bot typing';div.id=id;div.innerHTML=`<div class="avatar">🎬</div><div class="bubble"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;box.appendChild(div);scroll();return id}
function removeTyping(id){const el=document.getElementById(id);if(el)el.remove()}
function scroll(){const box=document.getElementById('chat-box');box.scrollTop=box.scrollHeight}
function esc(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>')}
function fmt(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/^\d+\.\s(.+)$/gm,'<li>$1</li>').replace(/^[-•]\s(.+)$/gm,'<li>$1</li>').replace(/(<li>.*<\/li>)/gs,s=>`<ul>${s}</ul>`).replace(/\n/g,'<br>')}
</script>
</body>
</html>
